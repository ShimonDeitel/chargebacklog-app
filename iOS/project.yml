name: ChargebackDisputeLog
options:
  bundleIdPrefix: com.shimondeitel.chargebacklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ChargebackDisputeLog:
    type: application
    platform: iOS
    sources:
      - path: ChargebackDisputeLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chargebacklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ChargebackDisputeLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChargebackDisputeLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChargebackDisputeLogTests
    dependencies:
      - target: ChargebackDisputeLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chargebacklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ChargebackDisputeLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChargebackDisputeLogUITests
    dependencies:
      - target: ChargebackDisputeLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chargebacklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ChargebackDisputeLog:
    build:
      targets:
        ChargebackDisputeLog: all
        ChargebackDisputeLogTests: [test]
        ChargebackDisputeLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ChargebackDisputeLog.storekit
    test:
      config: Debug
      storeKitConfiguration: ChargebackDisputeLog.storekit
      targets:
        - ChargebackDisputeLogTests
        - ChargebackDisputeLogUITests
    archive:
      config: Release
